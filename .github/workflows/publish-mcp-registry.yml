# Publishes the Apiosk MCP server to npm, PyPI, and the official MCP Registry.
#
# Trigger: push a version tag, e.g.
#   git tag v1.7.0 && git push origin v1.7.0
#
# The MCP Registry only stores metadata, so the npm and PyPI artifacts must be
# published first; the registry then verifies ownership by matching:
#   - npm:  package.json "mcpName"                 == server.json "name"
#   - PyPI: "mcp-name: <name>" marker in README    == server.json "name"
#
# Registry auth uses GitHub OIDC (id-token: write), so no registry token is
# stored as a secret. See:
# https://github.com/modelcontextprotocol/registry/blob/main/docs/modelcontextprotocol-io/github-actions.mdx

name: Publish MCP Server

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # ---------------------------------------------------------------------------
  # 1. Verify the tag matches the versions declared in the manifests.
  #    Prevents publishing a tag that disagrees with package.json / server.json.
  # ---------------------------------------------------------------------------
  verify-versions:
    name: Verify versions match tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: extract
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Assert package.json, pyproject.toml, server.json agree with tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          NPM_VERSION="$(node -p "require('./package.json').version")"
          SERVER_VERSION="$(node -p "require('./server.json').version")"
          MCP_NAME_PKG="$(node -p "require('./package.json').mcpName")"
          SERVER_NAME="$(node -p "require('./server.json').name")"
          PY_VERSION="$(grep -E '^version = ' pyproject.toml | head -1 | sed -E 's/version = \"(.*)\"/\1/')"

          echo "tag=$TAG_VERSION npm=$NPM_VERSION pypi=$PY_VERSION server.json=$SERVER_VERSION"
          echo "mcpName=$MCP_NAME_PKG server.name=$SERVER_NAME"

          fail=0
          [ "$NPM_VERSION" = "$TAG_VERSION" ]    || { echo "::error::package.json version ($NPM_VERSION) != tag ($TAG_VERSION)"; fail=1; }
          [ "$PY_VERSION" = "$TAG_VERSION" ]      || { echo "::error::pyproject.toml version ($PY_VERSION) != tag ($TAG_VERSION)"; fail=1; }
          [ "$SERVER_VERSION" = "$TAG_VERSION" ]  || { echo "::error::server.json version ($SERVER_VERSION) != tag ($TAG_VERSION)"; fail=1; }
          [ "$MCP_NAME_PKG" = "$SERVER_NAME" ]    || { echo "::error::package.json mcpName ($MCP_NAME_PKG) != server.json name ($SERVER_NAME)"; fail=1; }
          exit $fail

      - name: Assert README carries the PyPI ownership marker
        run: |
          SERVER_NAME="$(node -p "require('./server.json').name")"
          grep -qF "mcp-name: ${SERVER_NAME}" README.md \
            || { echo "::error::README.md is missing the 'mcp-name: ${SERVER_NAME}' marker required for PyPI ownership verification"; exit 1; }

  # ---------------------------------------------------------------------------
  # 2. Publish the npm package (canonical artifact).
  # ---------------------------------------------------------------------------
  publish-npm:
    name: Publish to npm
    needs: verify-versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ---------------------------------------------------------------------------
  # 3. Publish the PyPI launcher package.
  # ---------------------------------------------------------------------------
  publish-pypi:
    name: Publish to PyPI
    needs: verify-versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  # ---------------------------------------------------------------------------
  # 4. Publish server.json to the MCP Registry once both packages exist.
  #    Uses GitHub OIDC — the io.github.<owner>/ namespace is proven by the
  #    id-token, so no registry secret is required.
  # ---------------------------------------------------------------------------
  publish-registry:
    name: Publish to MCP Registry
    needs: [publish-npm, publish-pypi]
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC auth to the registry
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" \
            | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/

      - name: Wait for npm to index the new version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for i in $(seq 1 20); do
            if npm view "@apiosk/mcp@${VERSION}" version >/dev/null 2>&1; then
              echo "npm has @apiosk/mcp@${VERSION}"
              exit 0
            fi
            echo "waiting for npm to index @apiosk/mcp@${VERSION} (attempt $i)..."
            sleep 15
          done
          echo "::error::npm did not index @apiosk/mcp@${VERSION} in time"
          exit 1

      - name: Authenticate with the MCP Registry via GitHub OIDC
        run: mcp-publisher login github-oidc

      - name: Publish server.json
        run: mcp-publisher publish

      - name: Verify the server is live in the registry
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sleep 5
          curl -s "https://registry.modelcontextprotocol.io/v0.1/servers?search=io.github.obcraft/apiosk-mcp" \
            | grep -q "\"version\":\"${VERSION}\"" \
            && echo "Registry shows version ${VERSION}" \
            || { echo "::error::Registry did not report version ${VERSION}"; exit 1; }
