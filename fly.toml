app = "apiosk-mcp"
primary_region = "ams"

[env]
  APIOSK_MCP_PUBLIC_BASE_URL = "https://mcp.apiosk.com"
  APIOSK_CONTROL_PLANE_BACKEND_URL = "https://dashboard.apiosk.com"
  APIOSK_DASHBOARD_URL = "https://dashboard.apiosk.com"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
